name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ApartmentManager.sln
      - name: Test
        run: dotnet test ApartmentManager.sln --configuration Release --no-build
      - name: Publish WPF
        run: dotnet publish src/Wpf/ApartmentManager.Wpf.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build Installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\InnoSetup.iss'
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: ApartmentManager-Installer
          path: '**/Setup-ApartmentManager.exe'